# Continuous Deployment
#
# Mirrors client-portal-mobile's .github/workflows/cd.yml, re-expressed as an
# EAS Workflow. Push to `main` deploys each channel; each channel auto-routes
# per the native fingerprint:
#   fingerprint matches latest build on channel -> OTA update (free, fast)
#   fingerprint drifted (or no build yet)        -> native build (+ submit)
#
# runtimeVersion policy is `fingerprint` (app.json), so an OTA only reaches
# binaries whose native layer matches. EAS computes the fingerprint server-side
# (`fingerprint` job), looks up a matching build (`get-build`), and the `if`
# conditions pick update-vs-build. No manual `fingerprint:compare` parsing like
# the GitHub Actions version — EAS does it natively.
#
# Channel -> eas.json build/submit profile (same name). development is a dev
# client (build only); staging + production-testflight build, then submit.
#
# Routing is per channel (both-or-neither), matching the original: if EITHER
# platform's fingerprint drifted, both platforms rebuild and the OTA is skipped.
#
# SPIKE: narrowed to the `development` channel only (2 builds max on first run).
# `fingerprint_prod`, the `staging` + `production-testflight` channels, and all
# `submit` jobs are commented out below. Uncomment to restore the full pipeline.
#
# Simplified vs the original CD: no workflow_dispatch channel-picker or
# auto|update|build-submit mode inputs (those need long `if` chains). A manual
# run does a full pass. Ask if you want the forced-mode dispatch back.

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # --- Fingerprints: one per EAS environment, must match the build profile -----
  fingerprint_dev:
    name: Fingerprint (development env)
    type: fingerprint
    environment: development

  # ===== development channel (dev client, build only) =========================
  # Android disabled for spike — iOS only (faster). Original both-platform
  # jobs/routing kept commented below; uncomment all to restore.
  # dev_get_android:
  #   name: "development: find Android build"
  #   type: get-build
  #   needs: [fingerprint_dev]
  #   params:
  #     platform: android
  #     channel: development
  #     fingerprint_hash: ${{ needs.fingerprint_dev.outputs.android_fingerprint_hash }}

  dev_get_ios:
    name: "development: find iOS build"
    type: get-build
    needs: [fingerprint_dev]
    params:
      platform: ios
      channel: development
      fingerprint_hash: ${{ needs.fingerprint_dev.outputs.ios_fingerprint_hash }}
      # SPIKE: dev profile builds a simulator .app, so match simulator builds.
      simulator: true

  # Original both-platform OTA (restore after spike):
  # dev_update:
  #   name: "development: OTA update"
  #   type: update
  #   environment: development
  #   needs: [dev_get_android, dev_get_ios]
  #   if: ${{ needs.dev_get_android.outputs.build_id && needs.dev_get_ios.outputs.build_id }}
  #   params:
  #     channel: development
  dev_update:
    name: "development: OTA update"
    type: update
    environment: development
    needs: [dev_get_ios]
    if: ${{ needs.dev_get_ios.outputs.build_id }}
    params:
      channel: development
      platform: ios

  # Original both-platform build gate (restore after spike):
  # dev_build_ios:
  #   name: "development: build iOS"
  #   type: build
  #   needs: [dev_get_android, dev_get_ios]
  #   if: ${{ !needs.dev_get_android.outputs.build_id || !needs.dev_get_ios.outputs.build_id }}
  #   params:
  #     platform: ios
  #     profile: development
  dev_build_ios:
    name: "development: build iOS"
    type: build
    needs: [dev_get_ios]
    if: ${{ !needs.dev_get_ios.outputs.build_id }}
    params:
      platform: ios
      profile: development

